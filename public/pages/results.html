<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Speak Read – Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="sr-body">
  <header class="sr-header">
    <div class="sr-logo">Speak <span>Read</span></div>
    <nav class="sr-nav">
      <a href="index.html" class="sr-nav-link">Home</a>
      <a href="results.html" class="sr-nav-link sr-nav-link-active">Results</a>
    </nav>
  </header>

  <main class="sr-main">
    <section class="sr-panel">
      <div class="sr-results-header">
        <h1>Reading Sessions</h1>
        <button id="sr-clear-sessions" class="sr-btn sr-btn-outline">
          Clear All Sessions
        </button>
      </div>
      <p class="sr-results-subtitle">
        Each session includes level, duration, date, and a recording you can
        replay.
      </p>

      <div id="sr-results-list" class="sr-results-list">
        <!-- Sessions injected here -->
      </div>

      <div id="sr-results-empty" class="sr-results-empty" style="display:none;">
        <p>No sessions yet. Start one from the Home page.</p>
      </div>
    </section>
  </main>

  <footer class="sr-footer">
    <p>Speak Read &copy; <span id="sr-year"></span></p>
  </footer>

  <script type="module" src="js/results-page.js"></script>
</body>
</html>
