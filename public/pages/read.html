<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Speak Read – Reading Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="sr-body">
  <header class="sr-header">
    <div class="sr-logo">Speak <span>Read</span></div>
    <nav class="sr-nav">
      <a href="index.html" class="sr-nav-link">Home</a>
      <a href="results.html" class="sr-nav-link">Results</a>
    </nav>
  </header>

  <main class="sr-main sr-main-read">
    <section class="sr-panel sr-panel-reading">
      <div class="sr-reading-header">
        <div>
          <h1 id="sr-reading-title">Reading Session</h1>
          <p id="sr-reading-meta"></p>
        </div>
        <div class="sr-reading-status">
          <span class="sr-badge" id="sr-recording-status">Idle</span>
          <span class="sr-timer" id="sr-timer">00:00</span>
        </div>
      </div>

      <div class="sr-reading-layout">
        <article class="sr-reading-text">
          <h2 id="sr-passage-title"></h2>
          <p id="sr-passage-body"></p>
        </article>

        <aside class="sr-reading-recorder">
          <div class="sr-recorder-preview">
            <video id="sr-video-preview" autoplay playsinline muted></video>
            <audio id="sr-audio-preview" controls style="display:none;"></audio>
            <div class="sr-recorder-overlay" id="sr-recorder-overlay">
              <span>Preview</span>
            </div>
          </div>

          <div class="sr-recorder-controls">
            <button id="sr-btn-start" class="sr-btn sr-btn-primary">
              Start Recording
            </button>
            <button id="sr-btn-stop" class="sr-btn sr-btn-danger" disabled>
              Stop & Save
            </button>
          </div>

          <div class="sr-recorder-note">
            <p>
              When you press <strong>Start Recording</strong>, begin reading the
              passage out loud. Press <strong>Stop &amp; Save</strong> when
              finished.
            </p>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="sr-footer">
    <p>Speak Read &copy; <span id="sr-year"></span></p>
  </footer>

  <script type="module" src="js/read-page.js"></script>
</body>
</html>
